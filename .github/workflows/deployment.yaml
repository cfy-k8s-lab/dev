name: Release application

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: cfy-k8s-lab
  
      - name: Deploy version
        uses: Cloud-for-You/gh_action_deploy-apps@main
        with:
          repository: cfy-k8s-lab/ops
          ref: env/dev
          path: ops-repo
          token: ${{ steps.app-token.outputs.token }}
          deployment_file: foo.yaml
          jsonpath: "$.spec.tag"
          value: "v5"
          push: true
          pull_request: false
