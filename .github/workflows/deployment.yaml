on:
  workflow_dispatch:
    branch:
      - "main"

jobs:
  runs-on: ubuntu-latest
  steps:
    - name: Create token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ vars.APP_CLIENT_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
        owner: cfy-k8s-lab
  
    - name: Deploy version
      uses: Cloud-for-You/gh_action_deploy-apps@main
      with:
        repository: "cfy-k8s-lab/ops"
        branch: "main"
        token: ${{ secrets.GITHUB_TOKEN }}
        deployment_file: "config/app.json"
        jsonpath: "$.spec.tag"
        value: "5"
        push: true
        pull_request: false
